<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aravind</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"> 
</head>

<style>
  * {
    margin: 0;
    padding: 0;
  }
 

  /* header */

  .navbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 70px;
    background-color: rgb(10, 10, 10);
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1000;
  }

  .title {
    
    font-weight: 900;
    font-size: 20px;
    color: rgb(247, 244, 244);
    font-style: oblique;
    margin-left: 30px;
  }

  .nav-links {
    list-style: none;
    display: flex;
    margin-top: 20px;
    margin-right: 120px;
  }

  .nav-links a {
    color: white;
    text-decoration: none;
    transition: 0.3s;
  }

  .nav-links a:hover {
    color: rgb(52, 10, 243);
  }


  .menu-toggle {
    display: none;
    font-size: 28px;
    cursor: pointer;
  }

    .count{
      color: white;
    }

    /* home */

    .ship h1{
      position: absolute;
      top: 0;
      margin-top: 100px;
      color: white;
    }

    .ship{
      display: flex;
      justify-content: center;
    }

    .form{
    position: absolute;
    top: 200px;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
}

.form input{
    width: 100%;
    padding: 7px;
    margin-bottom: 20px;
}

.ship h2{
  position: absolute;
  top: 0;
  margin-top: 450px;
  color: white;
}

 .form-select{
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 300px;
  margin-top: 250px;
 }

 .form-select option{
   width: 100%;
    padding: 7px;
    margin-bottom: 20px;
 }

 .form button{
    width: 50%;
    padding: 10px;
    border-radius: 25px;
    cursor: pointer;
    margin-top: 70px;
    margin-left: 75px;
}

  .ship a{
    text-decoration: none;
    color: white;
  }

/* footer */

.footer{
     background-color: rgb(33, 33, 34);
     display: flex;
     justify-content: center;
     height: 60px;
}
.footertext{
  color: white;
  font-style: italic;
  margin-top: 20px;
}

</style>

<body>
    <!-- nav -->
  <header>
    <nav class="navbar">
      <div class="title">Aravind Store</div>
      <ul class="nav-links">
        <li><a href="./e-commerce0.html">Home</a></li>
      </ul>
      <div class="menu-toggle">&#9776;</div>
    </nav>
  </header>

  <!-- home -->

  <div class="ship" style="position: relative;">
      <img src="./shipping2.jpg" width="100%" height="630px" alt="">
      <h1>Shipping Address</h1>

      <form class="form" onsubmit="return submitForm(event)">
        <input type="text" placeholder="Full Name" required>
        <input type="text" placeholder="Address" required>
        <input type="text" placeholder="City" required>
        <input type="text" placeholder="Pincode" required>
        <select class="form-select" aria-label="Default select example">
        <option selected>Payment Method</option>
        <option value="1">Cash on Delivery</option>
        <option value="2">UPI</option>
        <option value="3">Credit Card</option>
        </select>
         <button class="btn btn-success" onclick="goCheckout('index')" >
          Conform Order
        </button>
    </form>
  </div>

  <!-- footer -->

  <footer class="footer">
    <h4 class="footertext">&copy; 2026 Aravind Store</h4>
  </footer>

  <script>
// Handle form submit (prevent page reload)
function submitForm(event) {
    event.preventDefault();
    return false;
}

// Checkout / Confirm Order
function goCheckout(page) {

    let inputs = document.querySelectorAll(".form input");
    let payment = document.querySelector(".form-select").value;

    let name = inputs[0].value.trim();
    let address = inputs[1].value.trim();
    let city = inputs[2].value.trim();
    let pincode = inputs[3].value.trim();

    // Validation
    if (name === "" || address === "" || city === "" || pincode === "" || payment === "Payment Method") {
        alert("Please fill all details!");
        return;
    }

    // Success message
    alert("Order placed successfully!");

    // Redirect to given page
    if (page && page !== "") {
        window.location.href = page + ".html";
    } else {
        window.location.href = "index.html";
    }
}

// Mobile menu toggle
const menuToggle = document.querySelector(".menu-toggle");
const navLinks = document.querySelector(".nav-links");

menuToggle.addEventListener("click", () => {
    navLinks.classList.toggle("active");
});
  </script>
</body>
</html>
